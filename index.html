<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#8B4513">
    <meta name="description" content="Hace click en el alfajor Guaymallen! Juego idle clicker adictivo.">
    <title>Come Alfajor - Guaymallen Clicker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/negro/A_negro_completo.png">
    <link rel="apple-touch-icon" href="images/negro/A_negro_completo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-value" id="alfajorCount">0</span>
                    <span class="stat-label">alfajores</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="apsCount">0.0</span>
                    <span class="stat-label">por segundo</span>
                </div>
            </div>
        </header>
        <main class="main-area">
            <div class="alfajor-container">
                <div id="alfajorClick" class="alfajor-click">
                    <img id="alfajorImg" src="images/negro/A_negro_envuelto1.png" alt="Alfajor Guaymallen" class="alfajor-img">
                </div>
                <div id="clickEffect" class="click-effect">+1</div>
            </div>
        </main>
        <aside class="shop">
            <div class="shop-tabs">
                <button class="tab-btn active" data-tab="alfajores">Alfajores</button>
                <button class="tab-btn" data-tab="edificios">Productores</button>
                <button class="tab-btn" data-tab="mejoras">
                    Mejoras
                    <span id="mejorasBadge" class="tab-badge">0</span>
                </button>
            </div>
            <div class="buy-bar hidden" id="buyBar">
                <span class="buy-bar-label">Comprar:</span>
                <button class="buy-amount-btn active" data-amount="1">x1</button>
                <button class="buy-amount-btn" data-amount="10">x10</button>
                <button class="buy-amount-btn" data-amount="100">x100</button>
            </div>
            <div class="shop-content" id="tab-alfajores">
                <div class="shop-items" id="alfajoresShop"></div>
            </div>
            <div class="shop-content hidden" id="tab-edificios">
                <div class="shop-items" id="edificiosShop"></div>
            </div>
            <div class="shop-content hidden" id="tab-mejoras">
                <div class="shop-items" id="mejorasShop"></div>
            </div>
        </aside>
    </div>
    <div id="migajasContainer"></div>
    <div id="notificacionesContainer"></div>
    <div id="goldenContainer"></div>
    <script src="game.js"></script>
</body>
    </html>
